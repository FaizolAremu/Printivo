<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printivo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <section class="section1">
        <div class="d-flex justify-content-between flex-wrap">
            <div class="link d-flex ">
                <a href="#" class="text-decoration-none fs-6 ">Cost Calculator</a>
                <a href="#" class="text-decoration-none fs-6 ">Discover Stores</a>
                <a href="#" class="text-decoration-none fs-6 ">Track Orders</a>
            </div>

            <div class="div2 d-flex ">
                <div class="">
                    <span>Need help? Call:</span>
                   <a href="#" class="text-decoration-none">+2347069000083</a>
                </div>

                <img src="./Media/whatsapp-img.svg" alt="" srcset="">
                <button><img src="./Media/nigeria-image.svg" alt="" srcset="">Nigeria</button>
                <button><img src="./Media/uk-img.svg" alt="" srcset="">UK</button>
            </div>
        </div>
    </section>

    <section class="main-section">
        <header class="nav-bar d-flex justify-content-between align-items-center">
            <img src="./Media/download.svg" alt="" srcset="">

            <nav class="nav-link">
                <a href="#">All Products</a>
                <a href="#">Become a Reseller</a>
                <a href="#">Merch Store</a>
                <a href="#">Marketplace</a>

                <span>
                <a href="#" class="text-danger">Sign in</a>
                <a href="#">Create Account</a>
                <img src="./Media/bin.svg" alt="" srcset="">
                </span>
            </nav>
        </header>

        <div class="maindiv-container mt-5">
            <div class="main-div">
                <h1>Quality Prints</h1>
                <h3>Shipped to your doorsteps</h3>
                <p>What will you like to print today?</p>
                <div class=" flex position-relative">
                    <input type="text" placeholder="Search for Business cards, T-shirts, Mugs,etc" name="" id="">
                    <img src="./Media/search-img.svg" alt="" srcset="">
                </div>
            </div>

            <div class="maindiv-img">
                <img src="./Media/Card3_n9kqin.webp" alt="">

            </div>


        </div>



    </section>



































    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
